<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Story</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img id="story-image" src="ezgif/ezgif-frame-001.jpg" alt="Story Frame">
            <div class="text-overlay">
                <div class="text-line">Hi</div>
                <div class="text-line">My Name is Simi</div>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="scroll-text">Scroll to continue story</div>
            <div class="scroll-arrow">↓</div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="frame-counter">
            <span id="current-frame">1</span> / <span id="total-frames">240</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
